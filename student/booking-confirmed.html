<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아자스쿨 멘토링 — 신청 완료</title>
  <script src="../system/theme-switcher.js"></script>
  <script src="../system/nav.js" defer></script>
  <script src="../system/shell-header.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../system/tokens.css">
  <link rel="stylesheet" href="../system/components.css">
  <style>
    /* 성공 섹션 */
    .success-wrap { padding:32px 20px 24px; text-align:center; }
    .check-circle {
      width:72px; height:72px; border-radius:50%;
      background:var(--color-success-bg);
      display:inline-flex; align-items:center; justify-content:center;
      margin:0 auto 20px;
    }
    .check-circle svg { color:var(--color-success); }
    .success-title { font:700 22px/1.25 var(--font-family); color:var(--color-text); letter-spacing:-0.2px; margin:0 0 10px; }
    /* 카카오 문자 제거 → 이메일 안내로 교체 — a647dd7 */
    .success-sub { font:var(--font-body); color:var(--color-text-weak); letter-spacing:var(--tracking-tight); line-height:1.5; margin:0; }

    /* 체험단 무료 배너 — ADR-008 */
    .free-banner {
      margin:0 20px 16px;
      padding:12px 16px;
      border-radius:var(--radius-md);
      background:var(--color-success-bg);
      font:var(--font-caption-strong);
      color:var(--color-success);
      letter-spacing:var(--tracking-tight);
      text-align:center;
    }

    /* 영수증 */
    .receipt { margin:4px 20px 16px; padding:20px; background:var(--color-surface-subtle); border-radius:var(--radius-lg); }
    .receipt .info-row { display:flex; justify-content:space-between; padding:8px 0; font:var(--font-body); letter-spacing:var(--tracking-tight); }
    .receipt .label { color:var(--color-text-weak); }
    .receipt .value { font-weight:500; color:var(--color-text); text-align:right; max-width:60%; }
    .receipt .info-row + .info-row { border-top:1px solid var(--color-border); }

    /* 플랫폼 안내 */
    .platform-info {
      margin:0 20px 16px;
      padding:12px 16px;
      border-radius:var(--radius-md);
      background:var(--color-surface);
      border:1px solid var(--color-border);
      font:var(--font-caption);
      color:var(--color-text-weak);
      letter-spacing:var(--tracking-tight);
      line-height:1.5;
    }
    .platform-info strong { color:var(--color-text); font-weight:600; }

    /* CTA 두 버튼 */
    .cta-two { display:flex; gap:10px; padding:0 20px 16px; }
    .cta-two .btn { flex:1; }

    /* 상담 입장 버튼 — CONFIRMED 상태에만 노출 */
    .enter-section { padding:0 20px 8px; }
    .btn-enter {
      width:100%; height:52px;
      border-radius:var(--radius-md);
      background:var(--color-primary);
      color:#fff;
      font:600 16px/1 var(--font-family);
      letter-spacing:var(--tracking-tight);
      border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-enter:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-enter-hint {
      padding:6px 20px 20px;
      font:var(--font-caption);
      color:var(--color-text-weak);
      letter-spacing:var(--tracking-tight);
      text-align:center;
    }

    /* 링크 미등록 모달 */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:flex-end; justify-content:center; z-index:200; }
    .modal { background:var(--color-surface); border-radius:var(--radius-lg) var(--radius-lg) 0 0; padding:28px 24px 32px; width:100%; max-width:480px; }
    .modal-title { font:700 17px/1.3 var(--font-family); color:var(--color-text); letter-spacing:var(--tracking-tight); margin:0 0 10px; }
    .modal-body { font:var(--font-body); color:var(--color-text-weak); letter-spacing:var(--tracking-tight); line-height:1.6; margin:0 0 24px; }
    .modal-actions { display:flex; gap:10px; }
    .modal-actions .btn { flex:1; }
  </style>
</head>
<body>
  <main class="mobile-canvas">

    <header class="app-bar with-back">
      <button class="icon-btn" aria-label="닫기">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h1 class="app-bar-title">신청 완료</h1>
      <span style="width:36px;"></span>
    </header>

    <!-- 성공 — 카카오 문자 제거, 이메일 안내로 교체 (a647dd7) -->
    <section class="success-wrap">
      <div class="check-circle">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 class="success-title">신청이 접수되었습니다</h2>
      <p class="success-sub">
        멘토님 확인 후 예약이 확정되면<br>
        이메일로 안내드려요.
      </p>
    </section>

    <!-- 체험단 무료 배너 — ADR-008 (FREE_TRIAL 일 때 노출) -->
    <div class="free-banner">
      체험단 무료 운영 기간 — 결제 없이 이용하실 수 있어요 🎉
    </div>

    <!-- 영수증 -->
    <div class="receipt">
      <div class="info-row"><span class="label">예약 번호</span><span class="value">#AJ-2026-0517-031</span></div>
      <div class="info-row"><span class="label">멘토</span><span class="value">김서연 · 서울대 경영</span></div>
      <div class="info-row"><span class="label">일시</span><span class="value">5월 17일 (토) 오후 2:00 · 60분</span></div>
      <div class="info-row"><span class="label">결제</span><span class="value" style="color:var(--color-success);">₩0 · 체험단 무료 운영</span></div>
    </div>

    <!-- 플랫폼 안내 — 카카오 채널 OUT, Zoom/Meet 안내로 교체 (a647dd7) -->
    <div class="platform-info">
      <strong>Zoom</strong>으로 진행돼요. 상담 15분 전부터 입장 버튼이 활성화됩니다.
    </div>

    <!-- CTA: 홈으로 + 내 예약 보기 -->
    <div class="cta-two">
      <button class="btn btn-secondary">홈으로</button>
      <button class="btn btn-primary" data-next="/mypage">내 예약 보기</button>
    </div>

    <!-- 상담 입장 버튼 — CONFIRMED 상태에서 노출, 15분 전 ~ 종료 30분 후 활성 -->
    <div class="enter-section">
      <button class="btn-enter" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        상담 입장
      </button>
      <p class="btn-enter-hint">상담 15분 전부터 입장 가능 · 종료 30분 후까지 유지</p>
    </div>

    <!-- 링크 미등록 당일 모달 (오버레이) — 목업 표시용 -->
    <!--
    <div class="overlay">
      <div class="modal">
        <h3 class="modal-title">상담 링크가 아직 등록되지 않았어요</h3>
        <p class="modal-body">
          오늘 상담이 예정되어 있어요. 멘토에게 연락하거나 운영팀에 문의해주세요.
        </p>
        <div class="modal-actions">
          <button class="btn btn-secondary">닫기</button>
          <button class="btn btn-primary">운영팀 문의</button>
        </div>
      </div>
    </div>
    -->

  </main>
</body>
</html>
