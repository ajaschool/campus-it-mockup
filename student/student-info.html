<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아자스쿨 멘토링 — 학생 정보</title>
  <script src="../system/theme-switcher.js"></script>
  <script src="../system/nav.js" defer></script>
  <script src="../system/shell-header.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../system/tokens.css">
  <link rel="stylesheet" href="../system/components.css">
  <style>
    .form-section {
      padding: 8px 20px 20px;
    }
    .form-section h2 {
      font: 600 16px/1.3 var(--font-family);
      color: var(--color-text);
      letter-spacing: var(--tracking-tight);
      margin: 0 0 4px;
    }
    .form-section .section-note {
      font: var(--font-caption);
      color: var(--color-text-weak);
      letter-spacing: var(--tracking-tight);
      margin: 0 0 16px;
    }
    .field { margin-bottom: 16px; }
    .field-label {
      display: block;
      font: 500 13px/1.2 var(--font-family);
      color: var(--color-text);
      letter-spacing: var(--tracking-tight);
      margin-bottom: 8px;
    }
    .field-label .optional {
      font-weight: 400;
      color: var(--color-text-weak);
      margin-left: 4px;
    }
    .input, .select, .textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface);
      font: var(--font-body);
      letter-spacing: var(--tracking-tight);
      color: var(--color-text);
    }
    .input::placeholder, .textarea::placeholder { color: var(--color-text-weak); }
    .input:focus, .select:focus, .textarea:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(27, 97, 201, 0.12);
    }
    .textarea {
      min-height: 96px;
      resize: vertical;
      font-family: var(--font-family);
    }

    /* Segmented control (grade selector) */
    .segmented {
      display: flex;
      gap: 6px;
    }
    .segmented button {
      flex: 1;
      height: 40px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface);
      color: var(--color-text);
      font: var(--font-caption-strong);
      letter-spacing: var(--tracking-tight);
    }
    .segmented button.is-selected {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #ffffff;
    }

    /* Chip multi-select */
    .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }

    /* Select dropdown */
    .select-wrap {
      position: relative;
    }
    .select-wrap::after {
      content: "";
      position: absolute;
      right: 16px;
      top: 50%;
      width: 8px; height: 8px;
      border-right: 1.5px solid var(--color-text-weak);
      border-bottom: 1.5px solid var(--color-text-weak);
      transform: translateY(-75%) rotate(45deg);
      pointer-events: none;
    }
    .select {
      appearance: none;
      padding-right: 36px;
    }

    /* Radio */
    .radio-group { display: flex; gap: 10px; }
    .radio-option {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface);
      font: var(--font-body);
      color: var(--color-text);
      letter-spacing: var(--tracking-tight);
      cursor: pointer;
    }
    .radio-option.is-selected {
      border-color: var(--color-primary);
      background: #eef3fb;
      color: var(--color-primary);
      font-weight: 500;
    }
    .radio-dot {
      width: 18px; height: 18px;
      border: 2px solid var(--color-border-strong);
      border-radius: 50%;
      flex: 0 0 18px;
      position: relative;
    }
    .radio-option.is-selected .radio-dot {
      border-color: var(--color-primary);
      background: var(--color-primary);
    }
    .radio-option.is-selected .radio-dot::after {
      content: "";
      position: absolute;
      inset: 3px;
      background: #ffffff;
      border-radius: 50%;
    }

    /* Info banner */
    .info-banner {
      margin: 8px 20px 0;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      background: #eef3fb;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .info-banner svg { color: var(--color-primary); flex: 0 0 18px; margin-top: 1px; }
    .info-banner p {
      font: var(--font-caption);
      color: var(--color-text);
      letter-spacing: var(--tracking-tight);
      line-height: 1.5;
      margin: 0;
    }

    /* Char counter */
    .char-counter {
      display: block;
      text-align: right;
      font: var(--font-caption);
      color: var(--color-text-weak);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <main class="mobile-canvas">

    <!-- App bar -->
    <header class="app-bar with-back">
      <button class="icon-btn" aria-label="뒤로">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1 class="app-bar-title">
        학생 정보 입력
        <span class="app-bar-title-sub">2 / 3 단계</span>
      </h1>
      <span style="width:36px;"></span>
    </header>

    <!-- Progress -->
    <div class="progress">
      <div class="progress-bar"><div class="progress-bar-fill" style="width:66%;"></div></div>
    </div>

    <!-- Product summary (compact) -->
    <section class="product-summary" style="margin:4px 20px 16px;padding:10px 14px;">
      <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#f2d8c1,#c89a78);flex:0 0 36px;"></div>
      <div style="flex:1;min-width:0;">
        <p style="font:500 12px/1.2 var(--font-family);color:var(--color-text-weak);margin:0 0 2px;letter-spacing:var(--tracking-tight);">김서연 · 경영학과 진학 Q&amp;A 상담</p>
        <p style="font:500 13px/1.2 var(--font-family);color:var(--color-text);margin:0;letter-spacing:var(--tracking-tight);">4월 27일 (일) 오후 3:00 · 30분 · ₩29,900</p>
      </div>
    </section>

    <!-- 학생 정보 -->
    <section class="form-section">
      <h2>학생 정보</h2>
      <p class="section-note">상담받을 학생 기준으로 입력해 주세요.</p>

      <div class="field">
        <label class="field-label">이름</label>
        <input class="input" placeholder="예) 홍길동" value="이하은">
      </div>

      <div class="field">
        <label class="field-label">학년</label>
        <div class="segmented">
          <button>중1</button>
          <button>중2</button>
          <button>중3</button>
          <button>고1</button>
          <button class="is-selected">고2</button>
          <button>고3</button>
        </div>
      </div>

      <div class="field">
        <label class="field-label">연락처<span class="optional">(선택)</span></label>
        <input class="input" placeholder="010-0000-0000" inputmode="tel">
      </div>
    </section>

    <!-- 사전 질문 -->
    <section class="form-section" style="background:var(--color-surface-subtle); border-radius:var(--radius-lg); margin:0 20px; padding:20px;">
      <h2>사전 질문</h2>
      <p class="section-note">멘토가 상담 시작 전에 미리 읽고 준비합니다.</p>

      <div class="field">
        <label class="field-label">관심 대학 <span class="optional">(복수 선택)</span></label>
        <div class="chip-group">
          <span class="chip is-selected">서울대</span>
          <span class="chip is-selected">연세대</span>
          <span class="chip">고려대</span>
          <span class="chip">서강대</span>
          <span class="chip">한양대</span>
          <span class="chip">기타</span>
        </div>
      </div>

      <div class="field">
        <label class="field-label">관심 전공/계열</label>
        <input class="input" placeholder="예) 경영, 경제, 인문 계열" value="경영, 경제">
      </div>

      <div class="field">
        <label class="field-label">현재 고민</label>
        <textarea class="textarea" rows="5" placeholder="예) 문과인데 경영이 저에게 맞을지 고민이에요. 내신은 나쁘지 않지만 수능 성적이 애매해서...">문과인데 경영이 저에게 맞을지 고민이에요. 내신은 1.8 정도이고, 학생부에 경영 관련 활동이 부족한 것 같아요.</textarea>
        <span class="char-counter">62 / 500</span>
      </div>

      <div class="field">
        <label class="field-label">현재 성적대</label>
        <div class="select-wrap">
          <select class="select">
            <option>1등급 초반</option>
            <option selected>1등급 후반 ~ 2등급 초반</option>
            <option>2등급 중반</option>
            <option>3등급대</option>
            <option>4등급 이하</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label class="field-label">상담에서 얻고 싶은 것</label>
        <textarea class="textarea" rows="3" placeholder="예) 경영학과 실제 수업/학과 분위기, 학생부 방향 잡는 법 등"></textarea>
      </div>

      <div class="field" style="margin-bottom:0;">
        <label class="field-label">학부모 동석 여부</label>
        <div class="radio-group">
          <label class="radio-option is-selected">
            <span class="radio-dot"></span>
            학생 혼자
          </label>
          <label class="radio-option">
            <span class="radio-dot"></span>
            학부모 동석
          </label>
        </div>
      </div>
    </section>

    <!-- Info -->
    <div class="info-banner" style="margin-top:16px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <p>상담 시작 전 멘토에게만 공유되며, 개인정보는 상담 목적으로만 사용됩니다.</p>
    </div>

    <div style="height:16px;"></div>

    <!-- Bottom CTA -->
    <div class="bottom-cta">
      <div class="bottom-cta-summary">
        <span class="bottom-cta-price">₩29,900</span>
        <span class="bottom-cta-price-sub">4월 27일 (일) 오후 3:00 · 30분</span>
      </div>
      <button class="btn btn-primary" data-next="./checkout.html">다음</button>
    </div>

  </main>
</body>
</html>
