<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아자스쿨 멘토링 — 약관 동의 (학부모)</title>
  <script src="../system/theme-switcher.js"></script>
  <script src="../system/nav.js" defer></script>
  <script src="../system/shell-header.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../system/tokens.css">
  <link rel="stylesheet" href="../system/components.css">
  <style>
    .role-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--color-success-bg, var(--color-surface-subtle));
      color: var(--color-success, var(--color-text));
      border-radius: var(--radius-full);
      font: 600 11px/1.4 var(--font-family);
      letter-spacing: 0.3px;
      text-transform: uppercase;
      margin: 16px 20px 0;
    }

    .intro {
      padding: 10px 20px 8px;
    }
    .intro h1 {
      font: 700 22px/1.3 var(--font-family);
      color: var(--color-text);
      letter-spacing: -0.2px;
      margin: 0 0 8px;
    }
    .intro p {
      font: var(--font-body);
      color: var(--color-text-weak);
      letter-spacing: var(--tracking-tight);
      line-height: 1.5;
      margin: 0;
    }

    /* All consent */
    .all-consent {
      margin: 20px 20px 12px;
      padding: 16px 18px;
      background: var(--color-surface-subtle);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0.85;
    }
    .all-consent .checkbox {
      width: 22px; height: 22px;
      border: 2px solid var(--color-border-strong);
      border-radius: 6px;
      flex: 0 0 22px;
      position: relative;
    }
    .all-consent .label {
      flex: 1;
      font: 500 14px/1.3 var(--font-family);
      color: var(--color-text);
      letter-spacing: var(--tracking-tight);
    }
    .all-consent .sub {
      display: block;
      font: var(--font-caption);
      font-weight: 400;
      color: var(--color-text-weak);
      margin-top: 2px;
    }
    .all-consent-hint {
      display: block;
      text-align: center;
      padding: 0 20px 12px;
      font: var(--font-caption);
      color: var(--color-text-weak);
      letter-spacing: var(--tracking-tight);
    }

    /* Consent group */
    .consent-group {
      padding: 4px 20px 12px;
    }
    .consent-group h2 {
      font: 600 12px/1.3 var(--font-family);
      color: var(--color-text-weak);
      letter-spacing: 0.3px;
      text-transform: uppercase;
      margin: 18px 0 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .consent-group h2 .count {
      padding: 2px 7px;
      background: var(--color-text);
      color: #fff;
      border-radius: var(--radius-sm);
      font-size: 10px;
      letter-spacing: 0;
    }

    .consent-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 4px;
    }
    .consent-row + .consent-row {
      border-top: 1px solid var(--color-border);
    }
    .checkbox-md {
      width: 22px; height: 22px;
      border: 1.5px solid var(--color-border-strong);
      border-radius: 5px;
      flex: 0 0 22px;
      position: relative;
    }
    .consent-row.is-checked .checkbox-md {
      background: var(--color-primary);
      border-color: var(--color-primary);
    }
    .consent-row.is-checked .checkbox-md::after {
      content: "";
      position: absolute;
      left: 7px; top: 3px;
      width: 4px; height: 10px;
      border-right: 2.5px solid #ffffff;
      border-bottom: 2.5px solid #ffffff;
      transform: rotate(45deg);
    }
    .consent-label {
      flex: 1;
      font: var(--font-body);
      color: var(--color-text);
      letter-spacing: var(--tracking-tight);
    }
    .consent-code {
      font: 600 11px/1 var(--font-family);
      color: var(--color-text-weak);
      margin-right: 6px;
      letter-spacing: 0;
    }
    .consent-required {
      color: var(--color-error);
      font-size: 11px;
      font-weight: 700;
      margin-right: 6px;
    }
    .consent-optional {
      color: var(--color-text-weak);
      font-size: 11px;
      font-weight: 500;
      margin-right: 6px;
    }
    .consent-view {
      font: var(--font-caption-strong);
      color: var(--color-text-weak);
      letter-spacing: var(--tracking-tight);
    }

    .payment-terms-note {
      margin: 16px 20px 0;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      background: var(--color-surface-subtle);
      font: var(--font-caption);
      color: var(--color-text-weak);
      line-height: 1.6;
      letter-spacing: var(--tracking-tight);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .payment-terms-note svg { flex: 0 0 16px; margin-top: 1px; }
    .payment-terms-note strong { color: var(--color-text); font-weight: 500; }

    .child-terms-note {
      margin: 12px 20px 0;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      background: var(--color-amber-bg);
      font: var(--font-caption);
      color: #7a4a00;
      line-height: 1.6;
      letter-spacing: var(--tracking-tight);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .child-terms-note svg { flex: 0 0 16px; margin-top: 1px; }
    .child-terms-note strong { color: #5a3500; font-weight: 600; }
  </style>
</head>
<body>
  <main class="mobile-canvas">

    <!-- App bar -->
    <header class="app-bar with-back">
      <button class="icon-btn" aria-label="뒤로">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1 class="app-bar-title">
        약관 동의
        <span class="app-bar-title-sub">3 / 5 단계</span>
      </h1>
      <span style="width:36px;"></span>
    </header>

    <!-- Progress -->
    <div class="progress">
      <div class="progress-bar"><div class="progress-bar-fill" style="width:60%;"></div></div>
    </div>

    <!-- Role pill (selected in previous step) -->
    <span class="role-pill">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      학부모 가입
    </span>

    <!-- Intro -->
    <div class="intro">
      <h1>서비스 이용을 위한<br>약관에 동의해 주세요</h1>
      <p>필수 항목에 동의하셔야 가입이 완료됩니다. 각 항목을 개별 확인해 주세요.</p>
    </div>

    <!-- All consent -->
    <label class="all-consent">
      <span class="checkbox"></span>
      <div class="label">
        전체 약관에 동의
        <span class="sub">선택 항목 포함</span>
      </div>
    </label>
    <span class="all-consent-hint">* 일괄 동의는 참고용입니다. 개별 확인을 권장합니다.</span>

    <!-- Common required (T01-T04) -->
    <div class="consent-group">
      <h2>필수 동의 <span class="count">4</span></h2>
      <label class="consent-row is-checked">
        <span class="checkbox-md"></span>
        <span class="consent-label"><span class="consent-code">T01</span><span class="consent-required">필수</span>서비스 이용약관</span>
        <a class="consent-view" href="#">보기 ›</a>
      </label>
      <label class="consent-row is-checked">
        <span class="checkbox-md"></span>
        <span class="consent-label"><span class="consent-code">T02</span><span class="consent-required">필수</span>개인정보 수집·이용 동의</span>
        <a class="consent-view" href="#">보기 ›</a>
      </label>
      <label class="consent-row is-checked">
        <span class="checkbox-md"></span>
        <span class="consent-label"><span class="consent-code">T03</span><span class="consent-required">필수</span>본인확인 서비스 약관</span>
        <a class="consent-view" href="#">보기 ›</a>
      </label>
      <label class="consent-row is-checked">
        <span class="checkbox-md"></span>
        <span class="consent-label"><span class="consent-code">T04</span><span class="consent-required">필수</span>알림톡 수신 동의 (서비스 거래 알림)</span>
        <a class="consent-view" href="#">보기 ›</a>
      </label>
    </div>

    <!-- Optional -->
    <div class="consent-group">
      <h2>선택 동의 <span class="count" style="background:var(--color-text-weak);">3</span></h2>
      <label class="consent-row">
        <span class="checkbox-md"></span>
        <span class="consent-label"><span class="consent-code">T10</span><span class="consent-optional">선택</span>마케팅 정보 수신 (이벤트·프로모션)</span>
        <a class="consent-view" href="#">보기 ›</a>
      </label>
      <label class="consent-row">
        <span class="checkbox-md"></span>
        <span class="consent-label"><span class="consent-code">T11</span><span class="consent-optional">선택</span>개인정보 제3자 제공 (제휴 매칭)</span>
        <a class="consent-view" href="#">보기 ›</a>
      </label>
      <label class="consent-row">
        <span class="checkbox-md"></span>
        <span class="consent-label"><span class="consent-code">T12</span><span class="consent-optional">선택</span>맞춤 콘텐츠 추천 동의</span>
        <a class="consent-view" href="#">보기 ›</a>
      </label>
    </div>

    <!-- Child terms note (T09 deferred) -->
    <div class="child-terms-note">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <span><strong>만 14세 미만 자녀 등록 시</strong>에는 마이페이지에서 자녀 추가 시점에 <strong>법정대리인 동의(T09)</strong>를 별도로 받습니다.</span>
    </div>

    <!-- Payment terms note -->
    <div class="payment-terms-note">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="8"/></svg>
      <span><strong>전자상거래법(T13) · 결제대행 약관(T14)</strong>은 결제 진행 시점에 별도로 안내됩니다.<br>선택 동의는 가입 후 <strong>마이페이지에서 언제든지 철회</strong>할 수 있습니다.</span>
    </div>

    <div style="height:20px;"></div>

    <!-- Bottom CTA -->
    <div class="bottom-cta">
      <button class="btn btn-primary btn-block" data-next="./phone.html">동의하고 계속 (본인인증)</button>
    </div>

  </main>
</body>
</html>
