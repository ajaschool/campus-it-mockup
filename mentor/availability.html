<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아자스쿨 멘토링 — 상담 가능 시간</title>
  <script src="../system/theme-switcher.js"></script>
  <script src="../system/nav.js" defer></script>
  <script src="../system/shell-header.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../system/tokens.css">
  <link rel="stylesheet" href="../system/components.css">
  <style>
    /* ── 섹션 블록 ── */
    .block {
      margin: 16px 20px 0;
      padding: 20px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
    }
    .block-title {
      font: 600 15px/1.3 var(--font-family);
      letter-spacing: var(--tracking-tight);
      color: var(--color-text);
      margin: 0 0 4px;
    }
    .block-sub {
      font: var(--font-caption);
      color: var(--color-text-weak);
      letter-spacing: var(--tracking-tight);
      margin: 0 0 16px;
      line-height: 1.5;
    }

    /* ── 1시간 단위 그리드 — ADR-009 (8bc2caf) ── */
    /*
      UI: 시간(행) × 요일(열) 셀 그리드.
      HOUR_SLOTS: 09:00~21:00 1시간 단위 (13개)
      탭으로 슬롯 on/off 토글
    */
    .grid-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .grid-header {
      display: grid;
      grid-template-columns: 52px repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 3px;
    }
    .grid-corner { /* 왼쪽 상단 빈 셀 */ }
    .grid-day-label {
      text-align: center;
      font: 600 12px/1 var(--font-family);
      color: var(--color-text-weak);
      letter-spacing: var(--tracking-tight);
      padding: 6px 0;
    }
    .grid-row {
      display: grid;
      grid-template-columns: 52px repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 3px;
    }
    .grid-time-label {
      font: 500 11px/1 var(--font-family);
      color: var(--color-text-weak);
      letter-spacing: var(--tracking-tight);
      display: flex;
      align-items: center;
      padding-right: 6px;
    }
    .grid-cell {
      height: 34px;
      border-radius: 4px;
      border: 1px solid var(--color-border);
      background: var(--color-surface-subtle);
      cursor: pointer;
      transition: background 120ms, border-color 120ms;
    }
    .grid-cell:hover {
      border-color: var(--color-primary);
      background: #eef3fb;
    }
    .grid-cell.is-active {
      background: var(--color-primary);
      border-color: var(--color-primary);
    }
    /* 토요일 컬럼 */
    .grid-cell.sat, .grid-day-label.sat { color: var(--color-primary); }
    .grid-cell.sat.is-active { background: var(--color-primary); }
    /* 일요일 컬럼 */
    .grid-cell.sun, .grid-day-label.sun { color: var(--color-error, #c0392b); }

    /* ── 정책 안내 칩 ── */
    .policy-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 8px 12px;
      border-radius: var(--radius-md);
      background: #eef3fb;
      font: var(--font-caption);
      color: var(--color-primary);
      letter-spacing: var(--tracking-tight);
      line-height: 1.4;
    }
    .policy-chip svg { flex: 0 0 14px; }

    /* ── 요약 카드 ── */
    .summary-card {
      margin: 16px 20px 0;
      padding: 16px 18px;
      border-radius: var(--radius-lg);
      background: #eef3fb;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .summary-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--color-primary);
      color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      flex: 0 0 40px;
    }
    .summary-text {
      font: var(--font-body);
      color: var(--color-text);
      letter-spacing: var(--tracking-tight);
      line-height: 1.5;
      margin: 0;
    }
    .summary-text strong { font-weight: 700; color: var(--color-primary); }
  </style>
</head>
<body>
  <main class="mobile-canvas">

    <header class="app-bar with-back">
      <button class="icon-btn" aria-label="뒤로">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1 class="app-bar-title">
        상담 가능 시간
        <span class="app-bar-title-sub">4 / 4 단계</span>
      </h1>
      <span style="width:36px;"></span>
    </header>
    <div class="progress"><div class="progress-bar"><div class="progress-bar-fill" style="width:100%;"></div></div></div>

      <!-- ADR-009: 1시간 단위 + 멘티 D+3 정책 안내 -->
      <div class="policy-chip">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>

    <!-- 요약 -->

      <div class="summary-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <p class="summary-text">
        총 <strong>11개</strong> 슬롯 선택됨 · 이번 주 예약 가능

    <div style="height:16px;"></div>

    <div class="bottom-cta">

</html>
