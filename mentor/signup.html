<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아자스쿨 멘토링 — 멘토 가입</title>
  <script src="../system/theme-switcher.js"></script>
  <script src="../system/nav.js" defer></script>
  <script src="../system/shell-header.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../system/tokens.css">
  <link rel="stylesheet" href="../system/components.css">
  <style>
    .welcome {
      padding: 20px 20px 4px;
    }
    .welcome h1 {
      font: 700 22px/1.35 var(--font-family);
      color: var(--color-text);
      letter-spacing: -0.2px;
      margin: 0 0 8px;
    }
    .welcome p {
      font: var(--font-body);
      color: var(--color-text-weak);
      letter-spacing: var(--tracking-tight);
      line-height: 1.5;
      margin: 0;
    }

    .block {
      margin: 16px 20px 0;
      padding: 20px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
    }
    .block-title {
      font: 600 15px/1.3 var(--font-family);
      letter-spacing: var(--tracking-tight);
      color: var(--color-text);
      margin: 0 0 14px;
    }

    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    .field-label {
      display: block;
      font: 500 13px/1.2 var(--font-family);
      color: var(--color-text);
      letter-spacing: var(--tracking-tight);
      margin-bottom: 8px;
    }
    .field-label .opt { font-weight: 400; color: var(--color-text-weak); margin-left: 4px; }

    .input, .select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface);
      font: var(--font-body);
      letter-spacing: var(--tracking-tight);
      color: var(--color-text);
    }
    .input::placeholder { color: var(--color-text-weak); }
    .input:focus, .select:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(27, 97, 201, 0.12);
    }
    .select-wrap { position: relative; }
    .select {
      appearance: none;
      padding-right: 36px;
    }
    .select-wrap::after {
      content: "";
      position: absolute;
      right: 16px; top: 50%;
      width: 8px; height: 8px;
      border-right: 1.5px solid var(--color-text-weak);
      border-bottom: 1.5px solid var(--color-text-weak);
      transform: translateY(-75%) rotate(45deg);
      pointer-events: none;
    }

    /* Action input: input with button */
    .input-action {
      display: flex;
      gap: 8px;
    }
    .input-action .input { flex: 1; }
    .input-action .btn { flex: 0 0 auto; height: 46px; padding: 0 16px; }

    /* Segmented */
    .segmented {
      display: flex;
      gap: 6px;
    }
    .segmented button {
      flex: 1;
      height: 42px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface);
      color: var(--color-text);
      font: var(--font-caption-strong);
      letter-spacing: var(--tracking-tight);
    }
    .segmented button.is-selected {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #ffffff;
    }

    /* Status chip */
    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font: 500 12px/1 var(--font-family);
      letter-spacing: var(--tracking-tight);
    }
    .status-unverified { background: var(--color-surface-subtle); color: var(--color-text-weak); }
    .status-verified { background: var(--color-success-bg); color: var(--color-success); }

    .verify-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .verify-row .btn-verify {
      flex: 1;
      height: 44px;
      background: var(--color-text);
      color: #ffffff;
      border-radius: var(--radius-md);
      font: var(--font-button);
      letter-spacing: var(--tracking-tight);
    }

    /* Upload tile */
    .upload-tile {
      padding: 20px;
      border: 1.5px dashed var(--color-border-strong);
      border-radius: var(--radius-md);
      background: var(--color-surface-subtle);
      text-align: center;
      cursor: pointer;
    }
    .upload-tile .ico {
      display: inline-flex;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--color-surface);
      color: var(--color-primary);
      align-items: center; justify-content: center;
      margin-bottom: 10px;
    }
    .upload-tile .primary-text {
      display: block;
      font: 600 14px/1.3 var(--font-family);
      color: var(--color-text);
      letter-spacing: var(--tracking-tight);
      margin-bottom: 4px;
    }
    .upload-tile .meta {
      font: var(--font-caption);
      color: var(--color-text-weak);
      letter-spacing: var(--tracking-tight);
    }

    /* Uploaded state */
    .upload-done {
      padding: 14px 16px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .upload-done-icon {
      width: 36px; height: 36px;
      border-radius: var(--radius-md);
      background: var(--color-success-bg);
      color: var(--color-success);
      display: inline-flex; align-items: center; justify-content: center;
      flex: 0 0 36px;
    }
    .upload-done-body { flex: 1; min-width: 0; }
    .upload-done-name {
      font: 500 13px/1.2 var(--font-family);
      color: var(--color-text);
      letter-spacing: var(--tracking-tight);
      margin: 0 0 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .upload-done-size {
      font: var(--font-caption);
      color: var(--color-text-weak);
    }
    .upload-done .swap {
      font: var(--font-caption-strong);
      color: var(--color-primary);
      letter-spacing: var(--tracking-tight);
    }

    .upload-row + .upload-row { margin-top: 12px; }

    /* Info banner */
    .info-banner {
      margin: 16px 20px 0;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      background: #eef3fb;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .info-banner svg { color: var(--color-primary); flex: 0 0 20px; margin-top: 1px; }
    .info-banner p {
      font: var(--font-caption);
      color: var(--color-text);
      letter-spacing: var(--tracking-tight);
      line-height: 1.5;
      margin: 0;
    }
  </style>
</head>
<body>
  <main class="mobile-canvas">

    <!-- App bar -->
    <header class="app-bar with-back">
      <button class="icon-btn" aria-label="뒤로">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1 class="app-bar-title">
        멘토 가입
        <span class="app-bar-title-sub">1 / 4 단계 · 기본 정보·증빙</span>
      </h1>
      <span style="width:36px;"></span>
    </header>

    <!-- Progress -->
    <div class="progress">
      <div class="progress-bar"><div class="progress-bar-fill" style="width:25%;"></div></div>
    </div>

    <!-- Welcome -->
    <section class="welcome">
      <h1>학생·학부모가 신뢰할 수 있는<br>멘토가 되어주세요</h1>
      <p>가입 후 관리자 검수를 거쳐 승인되면 프로필이 공개됩니다. (보통 1-2 영업일)</p>
    </section>

    <!-- 기본 정보 -->
    <section class="block">
      <h2 class="block-title">기본 정보</h2>

      <div class="field">
        <label class="field-label">실명</label>
        <input class="input" placeholder="예) 김서연">
      </div>

      <div class="field">
        <label class="field-label">닉네임 <span class="opt">(멘티에게 보이는 이름)</span></label>
        <input class="input" placeholder="예) 서연쌤">
      </div>

      <div class="field">
        <label class="field-label">본인 인증</label>
        <div class="verify-row">
          <button class="btn-verify">휴대폰 본인인증 진행</button>
          <span class="status-chip status-unverified">미인증</span>
        </div>
      </div>
    </section>

    <!-- 학교·학과 정보 -->
    <section class="block">
      <h2 class="block-title">학교·학과 정보</h2>

      <div class="field">
        <label class="field-label">학교</label>
        <div class="select-wrap">
          <select class="select">
            <option>서울대학교</option>
            <option>연세대학교</option>
            <option>고려대학교</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label class="field-label">단과대</label>
        <div class="select-wrap">
          <select class="select">
            <option>경영대학</option>
            <option>인문대학</option>
            <option>공과대학</option>
            <option>사회과학대학</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label class="field-label">학과</label>
        <div class="select-wrap">
          <select class="select">
            <option>경영학과</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label class="field-label">학년</label>
        <div class="segmented">
          <button>1</button>
          <button>2</button>
          <button class="is-selected">3</button>
          <button>4</button>
          <button>졸업</button>
        </div>
      </div>

      <div class="field">
        <label class="field-label">입시 전형</label>
        <div class="select-wrap">
          <select class="select">
            <option>학생부종합전형</option>
            <option>학생부교과전형</option>
            <option>논술전형</option>
            <option>정시(수능)</option>
            <option>기타</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label class="field-label">입시 연도</label>
        <div class="select-wrap">
          <select class="select">
            <option>2022학년도</option>
            <option>2023학년도</option>
            <option>2024학년도</option>
            <option>2025학년도</option>
          </select>
        </div>
      </div>
    </section>

    <!-- 증빙 서류 -->
    <section class="block">
      <h2 class="block-title">증빙 서류 <span style="font-weight:400;color:var(--color-error);font-size:11px;margin-left:4px;">필수</span></h2>

      <div class="upload-row">
        <label class="field-label">재학증명서 또는 합격증명서</label>
        <div class="upload-done">
          <div class="upload-done-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="upload-done-body">
            <p class="upload-done-name">재학증명서_김서연.pdf</p>
            <p class="upload-done-size">1.2MB · 업로드 완료</p>
          </div>
          <button class="swap">교체</button>
        </div>
      </div>

      <div class="upload-row">
        <label class="field-label">학교 이메일 인증 <span class="opt">(@snu.ac.kr)</span></label>
        <div class="input-action">
          <input class="input" placeholder="example@snu.ac.kr">
          <button class="btn btn-secondary">메일 발송</button>
        </div>
        <div style="margin-top:8px;">
          <span class="status-chip status-unverified">미인증</span>
        </div>
      </div>
    </section>

    <!-- Info -->
    <div class="info-banner">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <p>허위 증빙 제출 시 영구 이용 정지됩니다. 개인정보는 검수 목적으로만 사용됩니다.</p>
    </div>

    <div style="height:16px;"></div>

    <!-- Bottom CTA -->
    <div class="bottom-cta">
      <button class="btn btn-primary btn-block" data-next="./profile.html">다음: 멘토 프로필 작성</button>
    </div>

  </main>
</body>
</html>
